name: lsp_generator
description: A code generator for generating code from LSP specifications.
version: 1.0.0

publish_to: none

environment: 
  sdk: ^3.11.4

dependencies:
  args: 2.7.0
  code_builder: ^4.11.1
  collection: ^1.19.1
  dart_style: ^3.1.7
  freezed_annotation: ^3.1.0
  http: ^1.6.0
  json_annotation: ^4.12.0
  mason_logger: ^0.3.5
  path: ^1.9.1
  
dev_dependencies:
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  pro_lints: ^6.1.0
  test: ^1.31.1

executables: 
  lsp_generator: bin/lsp_generator.dart